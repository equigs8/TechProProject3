name: Create PR on Column Move

on:
  issues:
    types: [edited]

jobs:
  create_pr:
    runs-on: ubuntu-latest
    # This check ensures we only run if the 'Status' was moved to 'Review'
    # We use the GitHub CLI to verify the status inside the job for better reliability
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Status and Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # 1. Verify the current status of the issue on the project board
          # We check if the 'Status' field is actually 'Review'
          CURRENT_STATUS=$(gh item-field-list $ISSUE_NUMBER --project "YOUR_PROJECT_NAME" --format json | jq -r '.[] | select(.name=="Status") | .value')

          if [ "$CURRENT_STATUS" != "Review" ]; then
            echo "Issue is in $CURRENT_STATUS, not Review. Skipping."
            exit 0
          fi

          # 2. Query GraphQL for the linked branch
          BRANCH_NAME=$(gh api graphql -f id=$ISSUE_NODE_ID -f query='
            query($id: ID!) {
              node(id: $id) {
                ... on Issue {
                  timelineItems(last: 5, itemTypes: [CONNECTED_EVENT]) {
                    nodes {
                      ... on ConnectedEvent {
                        subject {
                          ... on Ref {
                            name
                          }
                        }
                      }
                    }
                  }
                }
              }
            }' --jq '.data.node.timelineItems.nodes[0].subject.name')

          if [ -z "$BRANCH_NAME" ] || [ "$BRANCH_NAME" == "null" ]; then
            echo "No branch linked to this issue. Please link it in the sidebar."
            exit 0
          fi

          # 3. Create the PR
          gh pr create \
            --head "$BRANCH_NAME" \
            --base main \
            --title "Review Request: Issue #$ISSUE_NUMBER" \
            --body "Auto-generated PR for Issue #$ISSUE_NUMBER"
