name: Create PR on Column Move

on:
  project_next_item:
    types: [edited]

jobs:
  create_pr:
    runs-on: ubuntu-latest
    # Only run if the 'Status' field was changed to 'Review'
    if: >
      github.event.changes.field_value.field_name == 'Status' && 
      github.event.project_next_item.field_values.status == 'Review'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Linked Branch and Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NODE_ID: ${{ github.event.project_next_item.content_node_id }}
        run: |
          echo "Checking for linked branches on Issue ID: $ISSUE_NODE_ID"

          # 1. Query GraphQL for the linked branch name via 'ConnectedEvent'
          # This looks for branches linked through the 'Development' sidebar in GitHub
          BRANCH_NAME=$(gh api graphql -f id=$ISSUE_NODE_ID -f query='
            query($id: ID!) {
              node(id: $id) {
                ... on Issue {
                  timelineItems(last: 5, itemTypes: [CONNECTED_EVENT]) {
                    nodes {
                      ... on ConnectedEvent {
                        subject {
                          ... on Ref {
                            name
                          }
                        }
                      }
                    }
                  }
                }
              }
            }' --jq '.data.node.timelineItems.nodes[0].subject.name')

          # 2. Check if a branch was found
          if [ -z "$BRANCH_NAME" ] || [ "$BRANCH_NAME" == "null" ]; then
            echo "Error: No branch linked to this issue. Please link a branch in the 'Development' section before moving to Review."
            exit 0
          fi

          echo "Found linked branch: $BRANCH_NAME"

          # 3. Create the Pull Request
          # Note: '--fill' automatically uses the Issue title and body for the PR
          gh pr create \
            --head "$BRANCH_NAME" \
            --base main \
            --title "Review Request: Issue #$(gh issue view $ISSUE_NODE_ID --json number -q .number)" \
            --body "This PR was automatically generated by moving Issue #$(gh issue view $ISSUE_NODE_ID --json number -q .number) to the Review column." \
            --label "automated-pr"
